<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Budget Tracker</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

<h1>💰 Budget Tracker</h1>

<p>Track your income and expenses easily</p>

</header>

<div class="container">

<div class="summary">

<div class="card income">

<h3>Total Income</h3>

<h2 id="income">₹0</h2>

</div>

<div class="card expense">

<h3>Total Expense</h3>

<h2 id="expense">₹0</h2>

</div>

<div class="card balance">

<h3>Balance</h3>

<h2 id="balance">₹0</h2>

</div>

</div>

<div class="goal">

<h2>Savings Goal 🎯</h2>

<input type="number" id="goal" placeholder="Enter Goal">

<button onclick="setGoal()">Save Goal</button>

<div class="progress">

<div id="progressBar"></div>

</div>

<p id="goalText">Goal: ₹0</p>

</div>

<div class="forms">

<div class="box">

<h2>Add Income</h2>

<input type="text" id="incomeName" placeholder="Source">

<input type="number" id="incomeAmount" placeholder="Amount">

<button onclick="addIncome()">Add Income</button>

</div>

<div class="box">

<h2>Add Expense</h2>

<input type="text" id="expenseName" placeholder="Expense">

<input type="number" id="expenseAmount" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

</div>

</div>

<div class="transactions">

<h2>Recent Transactions</h2>

<ul id="list"></ul>

</div>

<div class="chart">

<canvas id="budgetChart"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
